name: CI & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  ci:
    name: Install, Build & Test
    runs-on: ubuntu-latest
    steps:
      # Bumped from v4 to v6 to support Node 24 natively
      - name: Checkout Repo
        uses: actions/checkout@v6

      # Bumped from v4 to v6 to support Node 24 natively
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22 # Your code continues to compile/test on Node 22 cleanly
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check Build
        run: npm run build

      - name: Run Tests
        run: npm test

  release:
    name: Release to npm
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # Bumped from v4 to v6
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Bumped from v4 to v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        run: npm ci

      - name: Build Library
        run: npm run build

      # Check for updates to changesets if warnings persist
      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true